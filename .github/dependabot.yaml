version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 5
    reviewers:
      - 'nigelvining-agiledata'
    labels:
      - 'dependencies'
      - 'javascript'
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'
      include: 'scope'

  # GitHub Actions dependencies
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 3
    reviewers:
      - 'nigelvining-agiledata'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
